<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Button</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

.play-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 35px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 25px rgba(0,114,255,.5);
    transition:.3s;
}

.play-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px rgba(0,114,255,.8);
}

.play-icon{
    width:0;
    height:0;
    border-top:12px solid transparent;
    border-bottom:12px solid transparent;
    border-left:20px solid #fff;
}
</style>
</head>

<body>

<button class="play-btn" onclick="window.location.href='https://t.co/kmceIOHwBn'">
    <span class="play-icon"></span>
    PLAY VIDEO
</button>

</body>
</html>
